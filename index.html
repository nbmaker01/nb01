/<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-Frame WebXR GLB Example</title>

  <!-- A-Frame 라이브러리 로드 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 3D/VR 씬 -->
  <a-scene>

    <!-- ===== 카메라 + 이동 설정 ===== -->
    <!-- PC: WASD 이동 + 마우스 시점 -->
    <!-- VR: HMD 및 컨트롤러 자동 적용 -->
    <a-entity id="rig" position="0 1.6 10">
      <a-camera
        wasd-controls="acceleration: 50"
        look-controls="pointerLockEnabled: true">
      </a-camera>
    </a-entity>

    <!-- ===== VR 컨트롤러 ===== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

    <!-- ===== 하늘 (배경) ===== -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ===== 바닥 (훨씬 넓게) ===== -->
    <a-plane
      rotation="-90 0 0"
      width="300"
      height="300"
      color="#7BC8A4">
    </a-plane>

    <!-- ===== 조명 ===== -->
    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="10 20 10" intensity="1.2"></a-light>

    <!-- ===== 3D 모델 (.glb) - 10배 크기 ===== -->
    <a-entity
      gltf-model="model.glb"
      position="0 0 -10"    <!-- 더 멀리 배치 -->
      scale="10 10 10"      <!-- 10배 확대 -->
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>
/
