/<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-Frame WebXR GLB Example</title>

  <!-- A-Frame 라이브러리 로드 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 3D/VR 씬 -->
  <a-scene>

    <!-- ===== 카메라 + 이동 설정 ===== -->
    <!-- PC: WASD 이동 + 마우스 시점 -->
    <!-- VR: HMD 및 컨트롤러 자동 적용 -->
    <a-entity id="rig" position="0 1.6 5">
      <a-camera
        wasd-controls="acceleration: 40"
        look-controls="pointerLockEnabled: true">
      </a-camera>
    </a-entity>

    <!-- ===== VR 컨트롤러 ===== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

    <!-- ===== 하늘 (배경) ===== -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ===== 바닥 (더 넓게) ===== -->
    <a-plane
      rotation="-90 0 0"
      width="100"
      height="100"
      color="#7BC8A4">
    </a-plane>

    <!-- ===== 조명 ===== -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="5 15 5" intensity="1"></a-light>

    <!-- ===== 3D 모델 (.glb) - 더 크게 ===== -->
    <a-entity
      gltf-model="model.glb"
      position="0 0 -5"     <!-- 더 멀리 배치해서 크게 보이도록 -->
      scale="4 4 4"         <!-- 기존보다 더 크게 -->
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>/
