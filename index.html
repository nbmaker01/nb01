/<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-Frame WebXR GLB Example</title>

  <!-- A-Frame 라이브러리 로드 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 3D/VR 씬 -->
  <a-scene>

    <!-- ===== 카메라 + 이동 설정 ===== -->
    <!-- PC: WASD 이동 + 마우스 시점 -->
    <!-- VR: HMD 및 컨트롤러 자동 적용 -->
    <a-entity id="rig" position="0 20 6000">
      <a-camera
        wasd-controls="acceleration: 300"
        look-controls="pointerLockEnabled: true">
      </a-camera>
    </a-entity>

    <!-- ===== VR 컨트롤러 ===== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

    <!-- ===== 하늘 (배경) ===== -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ===== 바닥 (초대형) ===== -->
    <a-plane
      rotation="-90 0 0"
      width="200000"
      height="200000"
      color="#7BC8A4">
    </a-plane>

    <!-- ===== 조명 ===== -->
    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="1000 2000 1000" intensity="3"></a-light>

    <!-- ===== 3D 모델 (.glb) - 10000배 크기 ===== -->
    <a-entity
      gltf-model="model.glb"
      position="0 0 -3000"
      scale="10000 10000 10000"  <!-- 10000배 확대 -->
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>
/
